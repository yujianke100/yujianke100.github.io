<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLake — 轻量级 AI 原生数据湖平台</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    color: #e2e8f0;
  }

  .slide-container {
    width: 100%; height: 100vh;
    position: relative; overflow: hidden;
  }

  .slide {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 6vh 6vw;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    overflow-y: auto;
  }
  .slide.active {
    opacity: 1; pointer-events: auto;
  }

  /* Progress bar */
  .progress { position: fixed; bottom: 0; left: 0; height: 3px; background: #f59e0b; z-index: 100; transition: width 0.3s ease; }

  /* Slide counter */
  .slide-num {
    position: fixed; bottom: 16px; right: 24px;
    color: #475569; font-size: 0.8rem; font-weight: 600; z-index: 100;
    font-variant-numeric: tabular-nums;
  }

  /* Navigation arrows */
  .nav-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(30,41,59,0.8); border: 1px solid #2d3a50;
    color: #94a3b8; font-size: 1.4rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: all 0.2s; backdrop-filter: blur(8px);
  }
  .nav-arrow:hover { background: rgba(245,158,11,0.2); color: #f59e0b; border-color: #f59e0b; }
  .nav-arrow.prev { left: 16px; }
  .nav-arrow.next { right: 16px; }
  .nav-arrow:disabled { opacity: 0; pointer-events: none; }

  /* Background alternation */
  .slide:nth-child(even) { background: #111827; }
  .slide:nth-child(odd) { background: #0a0e1a; }

  /* Content */
  .content { max-width: 1100px; margin: 0 auto; width: 100%; }
  .content h1 {
    font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800;
    margin-bottom: 1.2rem; line-height: 1.2;
  }
  .content h2 {
    font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700;
    margin-bottom: 1.5rem; padding-bottom: 0.6rem;
    border-bottom: 2px solid #f59e0b; display: inline-block;
  }
  .content h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.8rem; color: #f59e0b; }
  .content p { line-height: 1.8; font-size: clamp(0.95rem, 1.4vw, 1.15rem); color: #cbd5e1; }
  .content .lead { font-size: clamp(1.1rem, 1.8vw, 1.4rem); color: #e2e8f0; line-height: 1.9; }

  /* Hero */
  .hero-gradient {
    background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 50%, #0f172a 100%);
  }
  .hero-title {
    font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 800; text-align: center;
    background: linear-gradient(135deg, #06b6d4 0%, #f59e0b 50%, #10b981 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 1.5rem;
  }
  .hero-sub {
    text-align: center; font-size: clamp(1rem, 1.8vw, 1.35rem);
    max-width: 800px; margin: 0 auto; color: #94a3b8; line-height: 1.8;
  }
  .hero-tag {
    display: inline-block; margin: 1.5rem auto 0;
    padding: 0.7rem 2rem; border: 1px solid #06b6d4; border-radius: 12px;
    background: rgba(6,182,212,0.08); color: #06b6d4; font-size: 1rem;
    text-align: center;
  }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; }
  @media (max-width:800px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* Cards */
  .card {
    background: #1e293b; border: 1px solid #2d3a50; border-radius: 14px;
    padding: 1.5rem; transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-2px); }
  .card h4 { color: #f59e0b; margin-bottom: 0.6rem; font-size: 1rem; }
  .card p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }

  /* Pain pairs */
  .pain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width:800px) { .pain-grid { grid-template-columns: 1fr; } }
  .pain-bad {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px; padding: 1.2rem 1.5rem;
  }
  .pain-bad .label { color: #ef4444; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
  .pain-bad p { font-size: 0.9rem; color: #94a3b8; }
  .pain-good {
    background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 12px; padding: 1.2rem 1.5rem;
  }
  .pain-good .label { color: #10b981; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
  .pain-good p { font-size: 0.9rem; color: #94a3b8; }

  /* Steps */
  .steps { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
  .step {
    flex: 1; min-width: 130px; max-width: 190px;
    background: #1e293b; border: 1px solid #2d3a50; border-radius: 12px;
    padding: 1rem; text-align: center;
  }
  .step .num {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.5rem; font-weight: 700; font-size: 0.85rem;
  }
  .step .num.g { background: #f59e0b; color: #000; }
  .step .num.t { background: #06b6d4; color: #000; }
  .step .num.gn { background: #10b981; color: #000; }
  .step h4 { font-size: 0.9rem; margin-bottom: 0.3rem; }
  .step p { font-size: 0.78rem; color: #64748b; }
  .step-arrow { color: #f59e0b; font-size: 1.3rem; align-self: center; }
  @media (max-width:900px) { .step-arrow { display: none; } }

  /* Tags */
  .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
  .tag-g { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tag-t { background: rgba(6,182,212,0.15); color: #06b6d4; }
  .tag-gn { background: rgba(16,185,129,0.15); color: #10b981; }

  /* Dialog */
  .dialog {
    background: #0d1117; border-radius: 12px; padding: 1rem 1.3rem; margin: 1rem 0;
    border: 1px solid #2d3a50; font-size: 0.9rem; line-height: 1.7;
  }
  .dialog .you { color: #06b6d4; }
  .dialog .ai { color: #10b981; }

  /* Catalog tree */
  .tree {
    background: #0d1117; border-radius: 12px; padding: 1rem 1.2rem;
    font-family: 'SF Mono','Fira Code',monospace; font-size: 0.82rem; line-height: 1.7;
    border: 1px solid #2d3a50;
  }

  /* Code */
  .code {
    background: #0d1117; border-radius: 10px; padding: 0.8rem 1rem;
    font-family: 'SF Mono',monospace; font-size: 0.82rem; line-height: 1.5;
    border: 1px solid #2d3a50; overflow-x: auto; margin: 0.8rem 0;
  }
  .code .hl { color: #f59e0b; }

  /* Quote */
  .quote {
    border-left: 3px solid #f59e0b; padding: 0.8rem 1.2rem; margin: 1rem 0;
    background: rgba(245,158,11,0.05); border-radius: 0 8px 8px 0;
    font-size: 0.92rem; color: #94a3b8; line-height: 1.6;
  }
  .quote strong { color: #e2e8f0; }

  /* Table */
  .table-wrap { overflow-x: auto; margin: 1rem 0; }
  table { width: 100%; border-collapse: collapse; font-size: clamp(0.75rem, 1.1vw, 0.88rem); }
  th, td { padding: 0.7rem 0.8rem; text-align: left; border-bottom: 1px solid #2d3a50; }
  th { background: #1e293b; color: #f59e0b; font-weight: 600; }
  td { color: #94a3b8; }
  td b { color: #e2e8f0; }
  .hl-cell { color: #f59e0b; font-weight: 600; }

  /* Mermaid */
  .mermaid-wrap {
    background: #1e293b; border-radius: 14px; padding: 1rem;
    border: 1px solid #2d3a50; overflow-x: auto; margin: 1rem 0;
  }
  .mermaid-wrap svg { max-width: 100%; height: auto; }

  /* Arch boxes */
  .arch-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin: 1rem 0; }
  @media (max-width:1000px) { .arch-grid { grid-template-columns: 1fr 1fr; } }
  .arch-box {
    background: #1e293b; border: 1px solid #2d3a50; border-radius: 12px;
    padding: 1.2rem; text-align: center;
  }
  .arch-box .big { font-size: 1.8rem; font-weight: 800; color: #f59e0b; }
  .arch-box h5 { font-size: 0.9rem; margin: 0.3rem 0; }
  .arch-box p { font-size: 0.8rem; color: #64748b; line-height: 1.5; }

  /* Features */
  .feat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
  @media (max-width:800px) { .feat-grid { grid-template-columns: 1fr 1fr; } }
  .feat-item {
    background: #1e293b; border: 1px solid #2d3a50; border-radius: 8px;
    padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.6rem;
    font-size: 0.82rem;
  }
  .feat-item .icon { font-size: 1rem; }
  .feat-item .n { font-weight: 600; }
  .feat-item .d { color: #64748b; font-size: 0.78rem; }

  /* Dir cards */
  .dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width:800px) { .dir-grid { grid-template-columns: 1fr; } }
  .dir-card {
    background: #1e293b; border: 1px solid #2d3a50; border-radius: 12px;
    padding: 1.2rem 1.3rem;
  }
  .dir-card h4 { color: #06b6d4; margin-bottom: 0.4rem; font-size: 0.95rem; }
  .dir-card p { font-size: 0.84rem; color: #94a3b8; line-height: 1.5; }

  /* Example box */
  .ex-box {
    background: rgba(6,182,212,0.06); border: 1px solid rgba(6,182,212,0.3);
    border-radius: 14px; padding: 1.5rem; margin: 1rem 0;
  }
  .ex-box .ex-label { color: #06b6d4; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
  .ex-box h3 { color: #e2e8f0; font-size: 1.15rem; margin-bottom: 0.6rem; }
  .ex-box p { font-size: 0.9rem; color: #94a3b8; }

  .mb-1 { margin-bottom: 0.8rem; }
  .mt-1 { margin-top: 0.8rem; }
  .text-center { text-align: center; }
  ul { margin: 0.5rem 0 0.5rem 1.5rem; }
  li { line-height: 1.7; color: #94a3b8; font-size: 0.9rem; }

  /* Architecture image */
  .arch-img-wrap { text-align: center; margin: 1rem 0; }
  .arch-img-wrap img { max-width: 90%; max-height: 55vh; border-radius: 12px; border: 1px solid #2d3a50; }
  .arch-img-wrap .caption { margin-top: 0.5rem; font-size: 0.82rem; color: #64748b; }

  /* Scroll hint for long slides */
  .slide-content-scroll { overflow-y: auto; flex: 1; padding-right: 8px; }
  .slide-content-scroll::-webkit-scrollbar { width: 4px; }
  .slide-content-scroll::-webkit-scrollbar-track { background: transparent; }
  .slide-content-scroll::-webkit-scrollbar-thumb { background: #2d3a50; border-radius: 2px; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="slide-container" id="app"></div>
<div class="progress" id="progress"></div>
<div class="slide-num" id="slideNum"></div>
<button class="nav-arrow prev" id="prevBtn">‹</button>
<button class="nav-arrow next" id="nextBtn">›</button>

<script>
const slides = [
  // Slide 0: Hero
  () => `
    <div class="content text-center" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh">
      <div class="hero-title">GLake</div>
      <p class="hero-sub" style="margin-top:1rem">
        一个<b style="color:#e2e8f0">面向 AI</b> 的轻量级数据湖平台——
        <br>散落的 CSV、PDF、API 数据统一管理，
        <br>AI 帮你导数据、查数据、用数据。
      </p>
      <div style="margin-top:2rem">
        <span class="hero-tag">←  以前是人直接和数据库打交道<br>现在是人 + WebUI + AI →</span>
      </div>
      <p style="margin-top:3rem;color:#475569;font-size:0.9rem">
        <span style="display:inline-block;animation:bounce 2s infinite">↓</span> 按 → 键或点击右侧箭头开始
      </p>
    </div>
    <style>@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}</style>
  `,

  // Slide 1: Running example
  () => `
    <div class="content">
      <h2>用同一个例子贯穿全文</h2>
      <p class="lead mb-1">整个介绍都围绕同一个研究问题展开——</p>
      <div class="ex-box">
        <div class="ex-label">贯穿全文的研究问题</div>
        <h3>"新能源汽车补贴政策，对整个产业链的影响到底有多大？"</h3>
        <p>要回答这个问题，需要四类数据：</p>
        <div style="margin-top:0.8rem">
          <span class="tag tag-g">🔵 政策文本</span> — 全国补贴政策、各省实施细则<br>
          <span class="tag tag-t">🟢 企业数据</span> — 整车厂财报、电池供应商产能<br>
          <span class="tag tag-gn">🟡 供应链关系</span> — 比亚迪的电池供应商是谁？<br>
          <span class="tag tag-g">🔴 案例数据</span> — 历史上补贴退坡后的市场反应
        </div>
      </div>
      <div class="grid-2 mt-1">
        <div class="card" style="border-color:rgba(239,68,68,0.3)">
          <h4 style="color:#ef4444">❌ 传统做法</h4>
          <p>一个一个找 → CSV 存本地 → PDF 丢文件夹 → 写脚本转格式 → 手动查 S3 → 跑 DuckDB……<br><b>一周过去，还没开始分析。</b></p>
        </div>
        <div class="card" style="border-color:rgba(6,182,212,0.4)">
          <h4 style="color:#06b6d4">✅ GLake 做法</h4>
          <p>统一导入 → Catalog 自动管理 → WebUI 浏览 → AI 辅助查询 → 跑分析模型。<br><b style="color:#10b981">一下午搞定。</b></p>
        </div>
      </div>
    </div>
  `,

  // Slide 2: Architecture diagram image
  () => `
    <div class="content">
      <h2>GLake 系统全景</h2>
      <div class="arch-img-wrap">
        <img src="https://raw.githubusercontent.com/yujianke100/policy-brain/main/docs/architecture.png" alt="GLake Architecture">
        <div class="caption">管理控制面 · 隔离计算层 · 统一存储层</div>
      </div>
    </div>
  `,

  // Slide 3: Architecture 4 sentences + mermaid
  () => `
    <div class="content">
      <h2>四句话讲清架构</h2>
      <div class="mermaid-wrap">
        <pre class="mermaid">
flowchart TB
    subgraph Control["管理控制面"]
        Web["Explorer WebUI (:8501)"]
        Auth["Auth Server (:8000)"]
        PG[("Postgres / OceanBase Catalog")]
    end
    subgraph Compute["隔离计算层"]
        CA["Docker Sandbox"]
        CB["Docker Sandbox"]
    end
    subgraph Storage["统一存储层"]
        OSS[("OSS (MinIO / 阿里云OSS)")]
    end
    Web --> Auth
    Auth --> PG
    Auth --> OSS
    CA --> OSS
    CB --> OSS
        </pre>
      </div>
      <div class="arch-grid">
        <div class="arch-box"><div class="big">①</div><h5>存储层放数据</h5><p>结构化→Parquet<br>非结构化→原生文件</p></div>
        <div class="arch-box"><div class="big">②</div><h5>Catalog 管元数据</h5><p>PostgreSQL 记录路径、标签、权限、README。<b>不存数据本身</b></p></div>
        <div class="arch-box"><div class="big">③</div><h5>控制面操作</h5><p>WebUI 浏览、API 编程、AI 按规范自动导入</p></div>
        <div class="arch-box"><div class="big">④</div><h5>计算层做脏活</h5><p>Docker 沙箱做格式转换，<br><b>不占管理节点资源</b></p></div>
      </div>
    </div>
  `,

  // Slide 4: Key design - decoupling
  () => `
    <div class="content">
      <h2>关键设计：存储计算解耦</h2>
      <p class="lead mb-1">同一个 Catalog，底层存哪里由环境变量决定——</p>
      <div class="code">
        <span class="hl"># 开发环境</span><br>
        Catalog → "逻辑路径: /新能源/政策" → 物理存: s3://minio:9000/warehouse/...<br><br>
        <span class="hl"># 生产环境</span><br>
        Catalog → "逻辑路径: /新能源/政策" → 物理存: s3://aliyun-oss/warehouse/...
      </div>
      <p style="font-size:1.1rem">切换只需改一个环境变量，<b style="color:#f59e0b">所有代码路径不用动</b>。</p>
      <div class="grid-3 mt-1">
        <div class="card"><h4>🔓 存储解耦</h4><p>逻辑路径+物理路径分离，本地 MinIO ↔ 阿里云 OSS 零代码迁移</p></div>
        <div class="card"><h4>🧪 计算隔离</h4><p>Docker 沙箱，每个导入任务独立运行，用完即销毁</p></div>
        <div class="card"><h4>🔑 权限分层</h4><p>5 级 API Key + 独立 S3 凭证，路径前缀强制隔离</p></div>
      </div>
    </div>
  `,

  // Slide 5: Pain 1-2
  () => `
    <div class="content">
      <h2>传统做法有多痛苦</h2>
      <p class="lead mb-1" style="font-size:1rem;color:#64748b">还是用"新能源汽车政策"的例子——</p>
      <div class="pain-grid">
        <div class="pain-bad">
          <div class="label">❌ 找数据靠"人肉"</div>
          <p>学生：数据在哪？<br>你：S3 ls 一下……<br>学生：有什么字段？<br>你：跑一下 DuckDB……<br>学生：Access Key 呢？<br>你：翻 .env 去</p>
        </div>
        <div class="pain-good">
          <div class="label">✅ WebUI 浏览</div>
          <p>打开 WebUI，像文件夹一样看所有数据集。<br>每个节点有 <span class="tag tag-g">新能源·补贴·产业政策</span> 标签和 README。</p>
        </div>
        <div class="pain-bad">
          <div class="label">❌ 导数据写脚本写到吐</div>
          <p>拿 CSV → 写 pandas 转 Parquet → boto3 传 S3 → 调 API 注册 → 写 README → 两个月后更新，脚本找不到了 → 重写</p>
        </div>
        <div class="pain-good">
          <div class="label">✅ AI 填表单出脚本</div>
          <p>告诉 AI 数据在哪 → AI 按模板填 YAML → 人确认 → AI 自动生成脚本并执行。<br>人只管<b>表单</b>，不碰代码。</p>
        </div>
      </div>
    </div>
  `,

  // Slide 6: Pain 3-5
  () => `
    <div class="content">
      <h2>传统做法有多痛苦（续）</h2>
      <div class="pain-grid">
        <div class="pain-bad">
          <div class="label">❌ 非结构化没人管</div>
          <p>PDF、调研报告、照片……散落在微信、邮箱、U 盘、NAS。想搜浙江 2023 年补贴细则？找到算你赢。</p>
        </div>
        <div class="pain-good">
          <div class="label">✅ 统一 Catalog 管理</div>
          <p>PDF/图片和 Parquet 表<b>同一个 Catalog</b>，tags + README 全覆盖，WebUI 可搜。</p>
        </div>
        <div class="pain-bad">
          <div class="label">❌ 权限管不住</div>
          <p>给合作方开放数据？要么给 SSH（整个服务器都能看），要么导出 CSV 发邮件（版本失控）。</p>
        </div>
        <div class="pain-good">
          <div class="label">✅ 5 级 API Key</div>
          <p>Admin / Global R/W / Project R/W / Project R。每个 Key 独立 S3 凭证，路径隔离。</p>
        </div>

// ---- Slide engine ----
let current = 0;
const app = document.getElementById('app');
const progress = document.getElementById('progress');
const numEl = document.getElementById('slideNum');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function render() {
  app.innerHTML = slides.map((fn, i) => `<div class="slide ${i === current ? 'active' : ''}" data-index="${i}"><div class="content" style="padding-top:${i===0?'0':'2vh'}">${fn()}</div></div>`).join('');
  progress.style.width = `${((current + 1) / slides.length) * 100}%`;
  numEl.textContent = `${current + 1} / ${slides.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === slides.length - 1;
  updateMermaid();
}

function updateMermaid() {
  setTimeout(() => {
    try { mermaid.run({ nodes: document.querySelectorAll('.mermaid') }); } catch(e) {}
  }, 100);
}

function go(n) {
  if (n < 0 || n >= slides.length) return;
  current = n;
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  if (e.key === 'Escape') { e.preventDefault(); go(0); }
});

prevBtn.addEventListener('click', () => go(current - 1));
nextBtn.addEventListener('click', () => go(current + 1));

// Mouse wheel navigation
let wheelTimeout;
app.addEventListener('wheel', e => {
  clearTimeout(wheelTimeout);
  wheelTimeout = setTimeout(() => {
    if (e.deltaY > 0) go(current + 1);
    else go(current - 1);
  }, 200);
}, { passive: true });

// Touch support
let touchStartY = 0;
app.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
app.addEventListener('touchend', e => {
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 50) {
    if (diff > 0) go(current + 1);
    else go(current - 1);
  }
});

render();
</script>
