// === Slide Manager ===
let current = 0;
const app = document.getElementById('app');
const progress = document.getElementById('progress');
const sn = document.getElementById('sn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

function render(idx) {
  const html = `<div class="slide active">${slides[idx]()}</div>`;
  app.innerHTML = html;
  progress.style.width = ((idx + 1) / slides.length * 100) + '%';
  sn.textContent = (idx + 1) + ' / ' + slides.length;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === slides.length - 1;
}

function go(n) {
  if (n < 0 || n >= slides.length) return;
  current = n;
  render(current);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
});
prevBtn.addEventListener('click', () => go(current - 1));
nextBtn.addEventListener('click', () => go(current + 1));

let tsx = 0;
document.addEventListener('touchstart', e => { tsx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsx;
  if (Math.abs(dx) > 60) { go(current + (dx < 0 ? 1 : -1)); }
});

render(0);
</script>
</body>
</html>
