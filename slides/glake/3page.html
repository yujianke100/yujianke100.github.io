<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLake — 3 页速览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0e1a }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; color:#e2e8f0 }
  .stage { width:100%; height:100vh; position:relative; overflow:hidden }
  .slide { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; padding:5vh 6vw; opacity:0; transform:scale(0.97); pointer-events:none; transition:opacity 0.4s ease, transform 0.4s ease; overflow-y:auto }
  .slide.active { opacity:1; transform:scale(1); pointer-events:auto }
  .slide:nth-child(even) { background:#111827 }
  .slide:nth-child(odd) { background:#0a0e1a }
  .progress { position:fixed; bottom:0; left:0; height:3px; background:linear-gradient(90deg,#06b6d4,#f59e0b); z-index:100; transition:width 0.3s ease }
  .sn { position:fixed; bottom:16px; right:24px; color:#94a3b8; font-size:0.9rem; font-weight:600; z-index:100; font-variant-numeric:tabular-nums; user-select:none }
  .na { position:fixed; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(30,41,59,0.85); border:1px solid #2d3a50; color:#94a3b8; font-size:1.6rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:100; transition:all 0.2s; backdrop-filter:blur(8px) }
  .na:hover { background:rgba(245,158,11,0.2); color:#f59e0b; border-color:#f59e0b }
  .na.pl { left:12px } .na.nx { right:12px }
  .na:disabled { opacity:0; pointer-events:none }

  .w { max-width:1100px; margin:0 auto; width:100% }
  .w h1 { font-size:clamp(2.2rem,4.5vw,3.5rem); font-weight:800; margin-bottom:0.6rem; line-height:1.2 }
  .w h2 { font-size:clamp(1.3rem,2.5vw,1.8rem); font-weight:700; margin-bottom:0.8rem; display:flex; align-items:center; gap:0.5rem }
  .w h2::after { content:''; flex:1; height:2px; background:linear-gradient(90deg,#f59e0b,transparent) }
  .w p { line-height:1.6; font-size:clamp(0.9rem,1.2vw,1.05rem); color:#e2e8f0 }

  .ht { font-size:clamp(2.5rem,6vw,4.5rem); font-weight:900; text-align:center;
    background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:0.5rem; line-height:1.1; letter-spacing:-0.02em }
  .hs { text-align:center; font-size:clamp(0.9rem,1.4vw,1.15rem); max-width:750px; margin:0 auto; color:#cbd5e1; line-height:1.7 }
  .htg { display:inline-block; margin:1rem auto 0; padding:0.4rem 1.4rem; border:1px solid #06b6d4; border-radius:10px; background:rgba(6,182,212,0.08); color:#06b6d4; font-size:clamp(0.8rem,0.95vw,0.9rem); text-align:center }

  .g2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem }
  .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.8rem }
  .g4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:0.7rem }
  .g5 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:0.5rem }
  @media(max-width:800px){ .g2,.g3,.g4,.g5{grid-template-columns:1fr} }

  .card { background:#1e293b; border:1px solid #2d3a50; border-radius:12px; padding:1rem }
  .card h4 { color:#f59e0b; margin-bottom:0.3rem; font-size:clamp(0.82rem,1vw,0.92rem); display:flex; align-items:center; gap:0.3rem }
  .card p { font-size:clamp(0.75rem,0.9vw,0.84rem); color:#cbd5e1; line-height:1.5 }

  .pb { background:rgba(239,68,68,0.05); border:1px solid rgba(239,68,68,0.25); border-radius:10px; padding:0.7rem 0.9rem }
  .pb .l { color:#ef4444; font-weight:600; font-size:clamp(0.72rem,0.82vw,0.78rem); margin-bottom:0.15rem }
  .pb p { font-size:clamp(0.72rem,0.85vw,0.8rem); color:#cbd5e1 }
  .pg { background:rgba(16,185,129,0.05); border:1px solid rgba(16,185,129,0.3); border-radius:10px; padding:0.7rem 0.9rem }
  .pg .l { color:#10b981; font-weight:600; font-size:clamp(0.72rem,0.82vw,0.78rem); margin-bottom:0.15rem }
  .pg p { font-size:clamp(0.72rem,0.85vw,0.8rem); color:#cbd5e1 }

  .dc { background:#1e293b; border:1px solid #2d3a50; border-radius:10px; padding:0.7rem 0.9rem }
  .dc h4 { color:#06b6d4; margin-bottom:0.2rem; font-size:clamp(0.78rem,0.95vw,0.86rem) }
  .dc p { font-size:clamp(0.68rem,0.8vw,0.76rem); color:#cbd5e1; line-height:1.45 }

  .ex-b { background:#1e293b; border:1px solid #f59e0b; border-radius:12px; padding:0.8rem 1rem; margin:0.5rem 0; text-align:center }
  .ex-b p { font-size:clamp(0.78rem,0.92vw,0.86rem); color:#cbd5e1 }

  .eb { background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.3); border-radius:12px; padding:0.8rem 1rem; margin:0.5rem 0 }
  .eb .el { color:#f59e0b; font-size:clamp(0.65rem,0.75vw,0.72rem); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.05rem }
  .eb h3 { color:#e2e8f0; font-size:clamp(0.9rem,1.15vw,1rem); margin-bottom:0.2rem }
  .eb p { font-size:clamp(0.75rem,0.9vw,0.84rem); color:#cbd5e1 }

  .steps { display:flex; gap:0.35rem; flex-wrap:wrap; justify-content:center }
  .step { flex:1; min-width:85px; max-width:130px; background:#1e293b; border:1px solid #2d3a50; border-radius:8px; padding:0.45rem 0.35rem; text-align:center }
  .step .n { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 0.25rem; font-weight:700; font-size:0.65rem }
  .g { background:#f59e0b; color:#000 } .t { background:#06b6d4; color:#000 } .gn { background:#10b981; color:#000 }
  .step h4 { font-size:clamp(0.68rem,0.75vw,0.76rem); margin-bottom:0.05rem }
  .step p { font-size:clamp(0.6rem,0.65vw,0.68rem); color:#94a3b8 }
  .sa { color:#f59e0b; font-size:0.9rem; align-self:center }
  @media(max-width:800px){.sa{display:none}}

  .tag { display:inline-block; padding:0.08rem 0.35rem; border-radius:4px; font-size:clamp(0.6rem,0.7vw,0.68rem); font-weight:600; margin:0.03rem }
  .tg { background:rgba(245,158,11,0.15); color:#f59e0b }
  .tt { background:rgba(6,182,212,0.15); color:#06b6d4 }
  .tgg { background:rgba(16,185,129,0.15); color:#10b981 }

  .num-xl { font-size:clamp(1.2rem,2vw,1.7rem); font-weight:800; line-height:1.1; display:block }
  .lbl-sm { font-size:clamp(0.55rem,0.65vw,0.6rem); color:#94a3b8; display:block; margin-top:0.05rem }

  .mb1 { margin-bottom:0.5rem } .mt1 { margin-top:0.5rem }
  ul { margin:0.2rem 0 0.2rem 1.2rem } li { line-height:1.5; color:#cbd5e1; font-size:clamp(0.78rem,0.9vw,0.84rem) }
  .bounce { animation:b2 2s infinite } @keyframes b2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="stage" id="app"></div>
<div class="progress" id="progress"></div>
<div class="sn" id="sn"></div>
<button class="na pl" id="prev">&lsaquo;</button>
<button class="na nx" id="next">&rsaquo;</button>

<script>
const slides = [];

// ══════════ PAGE 1: 封面 · 痛点 · 对比 ══════════
slides.push(() => `<div class="w tc" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1">
  <div class="ht">GLake</div>
  <p class="hs">别再让数据拖慢你的研究速度<br>
  所有数据在一个网页，按项目分门别类，<span style="color:#e2e8f0;font-weight:600">AI全程辅助</span></p>

  <div class="htg">从"四处找数据"到"数据来找你"</div>

  <div style="max-width:800px;margin:2.5vh auto 0">

    <div class="eb" style="margin-bottom:0.5rem">
      <div class="el">🧐 用一个例子理解 GLake 在解决什么问题</div>
      <h3>研究"新能源汽车补贴政策对产业链的影响"——<br>需要政策文本、企业数据、供应链关系、历史案例，<br><span style="color:#f59e0b">但这些数据分散在各处，怎么统一管起来？</span></h3>
      <p><span class="tag tg">政策文本</span> <span class="tag tt">企业数据</span> <span class="tag tgg">供应链关系</span> <span class="tag tg">历史案例</span></p>
    </div>

    <div class="g2" style="text-align:left">
      <div class="pb">
        <div class="l">😣 传统做法（即使有 AI）</div>
        <p>AI 帮忙写脚本导入 CSV —— 是能跑。<br>
        <b style="color:#e2e8f0">但下一次呢？</b>脚本丢在哪？格式变了找谁改？新同事来了又要从零开始？<br>
        <span style="color:#94a3b8">没有标准化，每次都是"一次性"。</span></p>
      </div>
      <div class="pg">
        <div class="l">😊 GLake 做法</div>
        <p>AI 按标准化模板填个表单，按规范自动生成导入脚本。<br>
        数据<b style="color:#10b981">自动注册到目录</b>，打上标签、写上说明。<br>
        <b style="color:#10b981">可复现、可管理、可传承，不怕人走茶凉。</b></p>
      </div>
    </div>
  </div>

  <p style="margin-top:2vh;color:#94a3b8;font-size:0.8rem"><span class="bounce" style="display:inline-block">&darr;</span> 按 &rarr; 看方案</p>
</div>`);

// ══════════ PAGE 2: 四句话架构 + 数据管道 + 解耦 ══════════
slides.push(() => `<div class="w" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <h2>🏗️ 四句话说清 GLake 怎么工作</h2>
  <div class="g4">
    <div class="card tc"><div style="font-size:1.3rem;font-weight:800;color:#f59e0b">①</div><h4 style="justify-content:center">放数据</h4><p>结构化 → Parquet 表<br>文件 → 原样保存<br>各归其位</p></div>
    <div class="card tc"><div style="font-size:1.3rem;font-weight:800;color:#f59e0b">②</div><h4 style="justify-content:center">管目录</h4><p>PostgreSQL 记录<br>每份数据在哪、<br>有什么标签、谁能用</p></div>
    <div class="card tc"><div style="font-size:1.3rem;font-weight:800;color:#f59e0b">③</div><h4 style="justify-content:center">操作它</h4><p>WebUI 像逛文件夹<br>API 给程序调用<br>AI 帮忙导入</p></div>
    <div class="card tc"><div style="font-size:1.3rem;font-weight:800;color:#f59e0b">④</div><h4 style="justify-content:center">做运算</h4><p>格式转换在独立<br>沙箱处理<br>不占管理节点</p></div>
  </div>

  <h2 style="font-size:clamp(1rem,1.8vw,1.3rem);margin-top:0.6rem">🤖 AI 帮你走完数据全流程</h2>
  <div class="steps mb1">
    <div class="step"><div class="n g">1</div><h4>开项目</h4><p>WebUI 创建<br>自动生成 Key</p></div>
    <div class="sa">→</div>
    <div class="step"><div class="n t">2</div><h4>告诉AI</h4><p>"把这份政策<br>数据导进来"</p></div>
    <div class="sa">→</div>
    <div class="step"><div class="n g">3</div><h4>AI 出脚本</h4><p>按规范模板<br>自动生成</p></div>
    <div class="sa">→</div>
    <div class="step"><div class="n gn">4</div><h4>执行导入</h4><p>CSV→Parquet<br>自动上传注册</p></div>
    <div class="sa">→</div>
    <div class="step"><div class="n t">5</div><h4>自动更新</h4><p>设定好周期<br>以后不用管</p></div>
  </div>

  <div style="background:#0d1117;border-radius:8px;padding:0.6rem 0.8rem;font-size:clamp(0.68rem,0.78vw,0.75rem);line-height:1.5;border:1px solid #1e293b;margin-top:0.4rem">
    <b style="color:#f59e0b">存储算力灵活扩展</b><br>
    <span style="color:#e2e8f0">数据存在本地（MinIO）还是云端（OSS）？</span> <span style="color:#94a3b8">改一个配置就切换，代码不用动。</span><br>
    <span style="color:#94a3b8">算力不够了可以扩展到集群节点做并行处理；数据压缩率高，省大量存储空间。</span><br>
    <span style="color:#64748b">还支持定时任务——设定好更新计划，平台自动定期拉取新数据，不用人手动操作。</span>
  </div>
</div>`);

// ══════════ PAGE 3: 数据一览 + 能做什么 + 亮点 ══════════
slides.push(() => `<div class="w" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <h2>📊 五大数据资源，GLake 统一管理</h2>

  <div class="g5 mb1" style="margin-bottom:1rem">
    <div class="card tc" style="border-color:rgba(245,158,11,0.3)">
      <span class="num-xl" style="color:#f59e0b">129万</span>
      <span class="lbl-sm">📄 政策文件</span>
      <p style="font-size:clamp(0.6rem,0.7vw,0.66rem);color:#94a3b8;margin-top:0.15rem">国家→省→市→县<br>全文+标题+标签</p>
    </div>
    <div class="card tc" style="border-color:rgba(6,182,212,0.3)">
      <span class="num-xl" style="color:#06b6d4">1.637亿</span>
      <span class="lbl-sm">⚖️ 裁判文书</span>
      <p style="font-size:clamp(0.6rem,0.7vw,0.66rem);color:#94a3b8;margin-top:0.15rem">全国法院全覆盖<br>36个关键字段</p>
    </div>
    <div class="card tc" style="border-color:rgba(16,185,129,0.3)">
      <span class="num-xl" style="color:#10b981">497万</span>
      <span class="lbl-sm">📜 法律法规</span>
      <p style="font-size:clamp(0.6rem,0.7vw,0.66rem);color:#94a3b8;margin-top:0.15rem">法律·法规·规章<br>44字段精细分类</p>
    </div>
    <div class="card tc" style="border-color:rgba(139,92,246,0.3)">
      <span class="num-xl" style="color:#8b5cf6;font-size:clamp(1rem,1.7vw,1.4rem)">187亿+</span>
      <span class="lbl-sm">🌍 LinkedIn</span>
      <p style="font-size:clamp(0.6rem,0.7vw,0.66rem);color:#94a3b8;margin-top:0.15rem">全球20+张专业表<br>人才·企业·岗位·技能</p>
    </div>
    <div class="card tc" style="border-color:rgba(236,72,153,0.3)">
      <span class="num-xl" style="color:#ec4899">5轮</span>
      <span class="lbl-sm">🏠 CHFS家调</span>
      <p style="font-size:clamp(0.6rem,0.7vw,0.66rem);color:#94a3b8;margin-top:0.15rem">2011-2019全覆盖<br>家庭·个人·综合</p>
    </div>
  </div>

  <h2 style="font-size:clamp(1rem,1.6vw,1.2rem)">💡 GLake 的核心优势：传统做法 vs GLake</h2>
  <div class="g2" style="margin-bottom:0.5rem">
    <div class="dc">
      <h4>📂 传统：数据散落各处，文件夹式管理靠人工</h4>
      <p><b style="color:#10b981">GLake：</b>所有数据一个网页，按项目分门别类。每份数据有标签、说明文档、可翻看样本，像逛文件夹一样直观</p>
    </div>
    <div class="dc">
      <h4>🤖 传统：导数据写脚本→另开工具分析→做完就忘</h4>
      <p><b style="color:#10b981">GLake：</b>AI贯穿全程——AI导入数据，也AI直接做查询和分析。从导入到出结果全在网页完成，不用另开工具</p>
    </div>
    <div class="dc">
      <h4>🔧 传统：存储满了迁移是噩梦，算力不够卡死</h4>
      <p><b style="color:#10b981">GLake：</b>存储算力按需迁移扩展，甚至到集群。数据压缩率高、查询快，省大量存储和算力成本</p>
    </div>
    <div class="dc">
      <h4>⏰ 传统：定期数据每次手动拉，漏一次分析全偏</h4>
      <p><b style="color:#10b981">GLake：</b>定时任务设置好，平台自动定期更新数据，不用操心</p>
    </div>
  </div>

  <div class="ex-b" style="padding:0.6rem 1rem">
    <p><b style="color:#f59e0b;font-size:clamp(0.85rem,1vw,0.95rem)">让任何团队花最少的力气，拥有自己的数据基础设施。</b><br>
    <span style="color:#94a3b8">存储、格式转换、权限、元数据、定时更新——这些脏活，GLake 帮你干了。</span><br>
    <span style="color:#94a3b8;font-size:clamp(0.6rem,0.7vw,0.65rem)">一台 Linux + Docker，</span><code style="color:#06b6d4;font-size:clamp(0.6rem,0.7vw,0.65rem)">bash manage.sh setup</code> <span style="color:#94a3b8;font-size:clamp(0.6rem,0.7vw,0.65rem)">搞定搭建</span></p>
  </div>
</div>`);


// Engine
let cur = 0;
const app = document.getElementById('app');
const pg = document.getElementById('progress');
const sn = document.getElementById('sn');
const prev = document.getElementById('prev');
const next = document.getElementById('next');

function render() {
  app.innerHTML = slides.map((fn, i) => `<div class="slide ${i === cur ? 'active' : ''}">${fn()}</div>`).join('');
  pg.style.width = `${((cur + 1) / slides.length) * 100}%`;
  sn.textContent = `${cur + 1} / ${slides.length}`;
  prev.disabled = cur === 0;
  next.disabled = cur === slides.length - 1;
}

function go(n) { if (n < 0 || n >= slides.length) return; cur = n; render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(cur + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(cur - 1); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
});
prev.addEventListener('click', () => go(cur - 1));
next.addEventListener('click', () => go(cur + 1));
let wt;
app.addEventListener('wheel', e => { clearTimeout(wt); wt = setTimeout(() => { if (e.deltaY > 0) go(cur + 1); else go(cur - 1); }, 200); }, { passive: true });
let ty = 0;
app.addEventListener('touchstart', e => { ty = e.touches[0].clientY; });
app.addEventListener('touchend', e => { const d = ty - e.changedTouches[0].clientY; if (Math.abs(d) > 50) { if (d > 0) go(cur + 1); else go(cur - 1); } });
render();
</script>
</body>
</html>
