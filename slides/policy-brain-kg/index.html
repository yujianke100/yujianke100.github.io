<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Brain KG 构建工作流 — Ontology-Driven KG Construction</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:#e2e8f0}

  .stage{width:100%;height:100vh;position:relative;overflow:hidden}
  .slide{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:5vh 7vw;
    opacity:0;transform:scale(0.96) translateY(12px);
    pointer-events:none;
    transition:opacity 0.5s ease,transform 0.5s ease;
    overflow-y:auto;
  }
  .slide.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
  .slide:nth-child(even){background:linear-gradient(135deg,#111827 0%,#0f172a 100%)}
  .slide:nth-child(odd){background:linear-gradient(135deg,#0a0e1a 0%,#0d1117 100%)}

  .progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#06b6d4,#f59e0b);z-index:100;transition:width 0.3s ease}
  .sn{position:fixed;bottom:16px;right:24px;color:#475569;font-size:0.82rem;font-weight:600;z-index:100;font-variant-numeric:tabular-nums;user-select:none}
  .na{
    position:fixed;top:50%;transform:translateY(-50%);
    width:44px;height:44px;border-radius:50%;
    background:rgba(30,41,59,0.6);border:1px solid rgba(45,58,80,0.6);
    color:#64748b;font-size:1.4rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:100;
    transition:all 0.25s;backdrop-filter:blur(6px);opacity:0.7;
  }
  .na:hover{opacity:1;background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.4)}
  .na.pl{left:16px}.na.nx{right:16px}
  .na:disabled{opacity:0;pointer-events:none}

  .w{max-width:1000px;width:100%;text-align:center}
  .wl{max-width:1000px;width:100%;text-align:left}

  .w h2{
    font-size:clamp(1.4rem,2.8vw,2rem);font-weight:700;margin-bottom:1rem;
    display:inline-block;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .wl h2{
    font-size:clamp(1.4rem,2.8vw,2rem);font-weight:700;margin-bottom:1rem;
    display:inline-block;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .w h3,.wl h3{font-size:clamp(1rem,1.4vw,1.15rem);font-weight:600;margin-bottom:0.5rem;color:#f59e0b}
  .w p,.wl p{line-height:1.65;font-size:clamp(0.92rem,1.25vw,1.05rem);color:#cbd5e1}
  .lead{font-size:clamp(1rem,1.4vw,1.15rem);color:#e2e8f0;line-height:1.7;margin-bottom:0.6rem}

  .ht{
    font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;text-align:center;
    background:linear-gradient(135deg,#06b6d4 0%,#f59e0b 50%,#10b981 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:1rem;line-height:1.15;
  }
  .hs{text-align:center;font-size:clamp(0.92rem,1.4vw,1.15rem);max-width:700px;margin:0 auto;color:#94a3b8;line-height:1.7}
  .htg{display:inline-block;margin:0.8rem auto 0;padding:0.45rem 1.5rem;border:1px solid rgba(6,182,212,0.3);border-radius:10px;background:rgba(6,182,212,0.06);color:#06b6d4;font-size:clamp(0.8rem,1vw,0.9rem);text-align:center}

  .g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;text-align:left}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.8rem;text-align:left}
  @media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}

  .card{
    background:linear-gradient(135deg,rgba(30,41,59,0.6),rgba(30,41,59,0.3));
    border:1px solid rgba(45,58,80,0.5);border-radius:10px;padding:1rem 1rem;
    transition:border-color 0.2s,transform 0.2s;
  }
  .card:hover{border-color:rgba(245,158,11,0.3);transform:translateY(-1px)}
  .card h4{color:#f59e0b;font-size:clamp(0.88rem,1.05vw,0.95rem);margin-bottom:0.35rem;font-weight:600}
  .card p{font-size:clamp(0.8rem,0.95vw,0.88rem);color:#94a3b8;line-height:1.5}
  .card .tag{margin-bottom:0.35rem}

  /* Highlighted card for 本体驱动 */
  .card-highlight{
    background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,182,212,0.06));
    border:1.5px solid rgba(16,185,129,0.35);border-radius:12px;padding:1.2rem 1.4rem;
    position:relative;overflow:hidden;
  }
  .card-highlight::before{
    content:'';position:absolute;top:0;left:0;width:4px;height:100%;
    background:linear-gradient(180deg,#10b981,#06b6d4);border-radius:2px;
  }
  .card-highlight h4{color:#10b981;font-size:clamp(0.95rem,1.15vw,1.05rem);margin-bottom:0.4rem;font-weight:600}
  .card-highlight p{font-size:clamp(0.82rem,0.98vw,0.9rem);color:#94a3b8;line-height:1.55}
  .card-highlight strong{color:#e2e8f0}

  /* Pipeline visual elements */
  .flow-row{display:flex;align-items:center;justify-content:center;gap:0.4rem;flex-wrap:wrap;margin:0.4rem 0}
  .flow-box{
    padding:0.45rem 0.8rem;border-radius:7px;border:1.5px solid;
    font-size:clamp(0.7rem,0.82vw,0.8rem);font-weight:600;text-align:center;min-width:65px
  }
  .flow-arrow{color:#475569;font-size:1rem}
  .f-green{border-color:rgba(16,185,129,0.4);color:#10b981;background:rgba(16,185,129,0.06)}
  .f-blue{border-color:rgba(56,189,248,0.4);color:#38bdf8;background:rgba(56,189,248,0.06)}
  .f-purple{border-color:rgba(167,139,250,0.4);color:#a78bfa;background:rgba(167,139,250,0.06)}

  .pb{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:0.8rem 1rem;text-align:left;transition:border-color 0.2s}
  .pb .l{color:#ef4444;font-weight:600;font-size:clamp(0.76rem,0.88vw,0.82rem);margin-bottom:0.15rem}
  .pb p{font-size:clamp(0.78rem,0.92vw,0.85rem);color:#94a3b8}
  .pg{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.25);border-radius:10px;padding:0.8rem 1rem;text-align:left}
  .pg .l{color:#10b981;font-weight:600;font-size:clamp(0.76rem,0.88vw,0.82rem);margin-bottom:0.15rem}
  .pg p{font-size:clamp(0.78rem,0.92vw,0.85rem);color:#94a3b8}
  .py{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:0.8rem 1rem;text-align:left}
  .py .l{color:#f59e0b;font-weight:600;font-size:clamp(0.76rem,0.88vw,0.82rem);margin-bottom:0.15rem}
  .py p{font-size:clamp(0.78rem,0.92vw,0.85rem);color:#94a3b8}

  .tag{display:inline-block;padding:0.1rem 0.4rem;border-radius:5px;font-size:clamp(0.68rem,0.78vw,0.74rem);font-weight:600}
  .tg{background:rgba(245,158,11,0.12);color:#f59e0b}
  .tt{background:rgba(6,182,212,0.12);color:#06b6d4}
  .tgg{background:rgba(16,185,129,0.12);color:#10b981}
  .tr{background:rgba(239,68,68,0.12);color:#ef4444}
  .tp{background:rgba(167,139,250,0.12);color:#a78bfa}

  .q{
    border-left:3px solid #f59e0b;padding:0.65rem 1rem;margin:0.5rem auto 0;max-width:860px;
    background:rgba(245,158,11,0.04);border-radius:0 8px 8px 0;
    font-size:clamp(0.8rem,0.95vw,0.88rem);color:#94a3b8;line-height:1.55;text-align:left
  }
  .q strong{color:#e2e8f0}

  .hl-box{
    background:#0d1117;border:1px solid rgba(45,58,80,0.4);border-radius:7px;
    padding:0.6rem 0.8rem;
    font-family:'SF Mono','Fira Code','Consolas',monospace;
    font-size:clamp(0.7rem,0.82vw,0.78rem);line-height:1.5;
    overflow-x:auto;margin:0.35rem 0;text-align:left
  }
  .hl-gray{color:#475569}.hl-key{color:#f59e0b}.hl-str{color:#10b981}.hl-op{color:#38bdf8}

  .tw{overflow-x:auto;margin:0.5rem auto;max-width:880px}
  table{width:100%;border-collapse:collapse;font-size:clamp(0.68rem,0.84vw,0.78rem)}
  th,td{padding:0.4rem 0.5rem;text-align:center;border-bottom:1px solid rgba(45,58,80,0.4)}
  th{background:rgba(30,41,59,0.6);color:#f59e0b;font-weight:600}
  td{color:#94a3b8}td b{color:#e2e8f0}

  .tc{text-align:center!important}
  .mb1{margin-bottom:0.6rem}.mt1{margin-top:0.6rem}
  .bounce{animation:b2 2s infinite}@keyframes b2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  ul{margin:0.3rem 0 0.3rem 1.1rem}li{line-height:1.5;color:#94a3b8;font-size:clamp(0.78rem,0.92vw,0.85rem)}
  strong{color:#e2e8f0}

  /* GPU resource grid */
</style>
</head>
<body>
<div class="stage" id="app"></div>
<div class="progress" id="progress"></div>
<div class="sn" id="sn"></div>
<button class="na pl" id="prev">&lsaquo;</button>
<button class="na nx" id="next">&rsaquo;</button>

<script>
const slides = [];

// === Slide 1: Cover ===
slides.push(() => `<div class="w tc" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1">
  <div class="ht">Policy Brain KG</div>
  <p class="hs" style="font-size:clamp(1.1rem,2vw,1.6rem)">Ontology-Driven Knowledge Graph Construction</p>
  <p class="hs" style="margin-top:0.5rem">从 Human-in-the-loop 到自动构建的知识图谱工作流</p>
  <div class="htg">本体驱动 · 本地大模型 · 大规模政策数据 · GNN 下游</div>
  <p style="margin-top:3vh;color:#475569;font-size:0.78rem"><span class="bounce" style="display:inline-block">&darr;</span> 按 &rarr; 键浏览</p>
</div>`);

// === Slide 2: Why KG ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>为什么要在此刻讨论 KG 构建？</h2></div>
  <p class="lead tc">数据已经就位，但知识仍是散装的</p>
  <div class="g2">
    <div class="pg"><div class="l">✅ 一仓五库 · GLake 数据中台</div>
      <p><b>政策主题仓</b>：政策文本百万级 · AI政策（中央/省/地市）<br>
         <b>法人综合库</b>：企业注册退出 800万+<br>
         <b>人口综合库</b>：LinkedIn · CHFS · 雇主-雇员匹配<br>
         <b>宏观经济库</b>：宏观面板 · 上市公司MD&A<br>
         <b>公共信用库</b>：裁判文书千万级 · 法律法规十万级</p>
    </div>
    <div class="pb"><div class="l">❌ 当前瓶颈</div>
      <p>数据是"散装"的——政策之间没有关系链接，裁判文书无法关联到政策引用，企业的政策红利传导无法被结构化查询，跨域查询只能靠人工拼凑。</p>
    </div>
  </div>
  <div class="q"><strong>一个简单的问题暴露了差距</strong>：<br>"2024年国务院发布的减税降费政策，哪些在2025年被废止？被废止后有多少裁判文书仍引用它们？"<br>无 KG → 搜索 + 人工拼凑；有 KG → 一条 Cypher 查询。</div>
</div>`);

// === Slide 3: The Hard Part ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>全局构图最大的困难在哪？</h2></div>
  <p class="lead tc">不是技术不会，是量太大、质量不可控</p>
  <div class="g2">
    <div class="pb"><div class="l">🔴 数据规模</div>
      <p>1.3M 政策 × 2K tokens ≈ 2.6B tokens，全量 API 抽取成本高。裁判文书千万级全量更不现实。</p>
    </div>
    <div class="pb"><div class="l">🔴 抽取质量</div>
      <p>政策文本是中国特色法律语言——引用的引用嵌套、缩略语。LLM 精度 85-92%，8% 偏差在百万级规模下产生大量错误三元组，且误差会沿推理路径传播放大。</p>
    </div>
  </div>
  <div class="q"><strong>但正因为难，所以有学术价值。</strong> 工程挑战 = 研究贡献。</div>
</div>`);

// === Slide 4: Why Ontology-Driven ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>为什么选本体驱动？</h2></div>
  <p class="lead tc">三条路线的对比</p>
  <div class="g2">
    <div class="card"><h4>🗺️ 纯 LLM Wiki (RAG)</h4>
      <span class="tag tg">搜索好，结构差</span>
      <p style="margin-top:0.35rem">向量检索在"找文档"上表现好，但无法回答结构化问题：哪些政策是废止关系？企业适合同一政策？<b>GNN 无图可喂</b>。</p>
    </div>
    <div class="card"><h4>🏗️ 纯 KG (自底向上)</h4>
      <span class="tag tr">噪声不可控</span>
      <p style="margin-top:0.35rem">无 schema 约束，LLM 自由抽取的三元组充满噪声、冗余和不一致。<b>垃圾进垃圾出</b>。</p>
    </div>
  </div>
  <div class="card-highlight" style="margin-top:0.6rem">
    <h4>🎯 本体驱动 KG（推荐方案）</h4>
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:0.5rem">
      <div style="flex:1;min-width:120px;text-align:center;background:rgba(16,185,129,0.1);border-radius:8px;padding:0.6rem 0.4rem">
        <div style="color:#10b981;font-weight:600;font-size:clamp(0.85rem,1vw,0.95rem)">1. 画框</div>
        <div style="font-size:clamp(0.7rem,0.82vw,0.78rem);color:#64748b">LLM 定本体（自上而下）<br>类·关系·约束</div>
      </div>
      <div style="color:#475569;font-size:1.2rem">→</div>
      <div style="flex:1;min-width:120px;text-align:center;background:rgba(56,189,248,0.1);border-radius:8px;padding:0.6rem 0.4rem">
        <div style="color:#38bdf8;font-weight:600;font-size:clamp(0.85rem,1vw,0.95rem)">2. 填充</div>
        <div style="font-size:clamp(0.7rem,0.82vw,0.78rem);color:#64748b">LLM 按 schema 约束<br>抽取结构化实例</div>
      </div>
      <div style="color:#475569;font-size:1.2rem">→</div>
      <div style="flex:1;min-width:120px;text-align:center;background:rgba(167,139,250,0.1);border-radius:8px;padding:0.6rem 0.4rem">
        <div style="color:#a78bfa;font-weight:600;font-size:clamp(0.85rem,1vw,0.95rem)">3. 入库</div>
        <div style="font-size:clamp(0.7rem,0.82vw,0.78rem);color:#64748b">噪声可检测<br>质量可衡量·GNN 可用</div>
      </div>
    </div>
  </div>
  <div class="q" style="margin-top:0.5rem"><strong>核心区别</strong>：不是"LLM 随便抽→拼成图"；而是"先画好框→LLM 往里填→填完检查"。</div>
</div>`);

// === Slide 5: Phase 1 全自动本体构建 ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>Phase 1 · LLM 全自动本体构建（自上而下）</h2></div>
  <p class="lead tc">利用 LLM 对政策法律体系的既有知识，从顶层分类框架逐步细化到底层属性</p>
  <div class="g2">
    <div class="card">
      <h4>Step 1 · 顶层框架注入</h4>
      <p>LLM 本身已掌握法律位阶（宪法/法律/行政法规/地方性法规）、发文机关分类、国民经济行业分类（GB/T 4754）等成熟体系。以此为基础，生成政策领域的顶层类层次。</p>
      <div class="hl-box" style="margin-top:0.35rem">
        Top-down: 法律位阶 → 发文机关 → 政策类型 → 适用范围<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;行业代码 → 受益主体分类 → 政策属性
      </div>
    </div>
    <div class="card">
      <h4>Step 2 · LLM 样本验证与补全</h4>
      <p>读 500 条代表性政策文本，校验顶层框架是否覆盖实际文本中的概念。发现遗漏则自动扩展——新增类、关系或约束。迭代 2-3 轮后确认。</p>
      <div style="font-size:clamp(0.72rem,0.85vw,0.8rem);color:#cbd5e1;margin-top:0.3rem">
        <span class="tag tgg">验证</span> 顶层类是否覆盖政策文本中 95%+ 的实体类型<br>
        <span class="tag tt">补全</span> 未覆盖的关系和属性自动添加<br>
        <span class="tag tg">迭代</span> 2-3 轮后趋稳
      </div>
    </div>
  </div>
  <div class="q"><strong>为什么自上而下比自底向上快？</strong> 自底向上需要从 1.3M 文本中聚类归纳，再人工提炼抽象结构。自上而下利用 LLM 已有领域知识直接构建框架，再用 500 条样本验证——不需要大量人工，又快又稳。</div>
</div>`);

// === Slide 6: Phase 2 ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>Phase 2 · LLM 实例填充</h2></div>
  <p class="lead tc">不是"动态编程"——是 <b>Schema-Guided Extraction</b></p>
  <div class="card-highlight" style="margin-bottom:0.5rem">
    <div style="display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap">
      <div style="color:#64748b;font-size:clamp(0.78rem,0.92vw,0.85rem)"><b style="color:#10b981">给定 schema</b> → 给 LLM 看文本 + 抽取规范 → <b style="color:#38bdf8">LLM 输出结构化 JSON</b></div>
    </div>
  </div>
  <div class="hl-box">
<span class="hl-gray">// Schema 定义（Phase 1 产出）</span><br>
{ <span class="hl-key">"policy"</span>: { properties: [发文机关, 发文时间, 文号], relations: [废止, 修订, 依据] } }<br><br>
<span class="hl-gray">// LLM 读政策文本 → 输出</span><br>
{ <span class="hl-key">"entities"</span>: [{ <span class="hl-str">"type"</span>: <span class="hl-str">"政策"</span>, <span class="hl-str">"id"</span>: <span class="hl-str">"财税[2023]1号"</span>, <span class="hl-str">"发文机关"</span>: <span class="hl-str">"财政部"</span> }],<br>
&nbsp;&nbsp;<span class="hl-key">"relations"</span>: [{ source: <span class="hl-str">"财税[2023]1号"</span>, type: <span class="hl-str">"废止"</span>, target: <span class="hl-str">"财税[1999]5号"</span> }] }
  </div>
  <div style="display:flex;flex-direction:column;gap:0.4rem">
    <div class="card"><h4>批量管线</h4>
      <p>本地模型批量处理 1.3M 政策，每条经 prompt 拼接 → 结构化输出 → schema 合规校验 → 入库。</p>

const nextBtn = document.getElementById('next');

function render(idx) {
  const html = `<div class="slide active">${slides[idx]()}</div>`;
  app.innerHTML = html;
  progress.style.width = ((idx + 1) / slides.length * 100) + '%';
  sn.textContent = (idx + 1) + ' / ' + slides.length;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === slides.length - 1;
}

function go(n) {
  if (n < 0 || n >= slides.length) return;
  current = n;
  render(current);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
});
prevBtn.addEventListener('click', () => go(current - 1));
nextBtn.addEventListener('click', () => go(current + 1));

let tsx = 0;
document.addEventListener('touchstart', e => { tsx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsx;
  if (Math.abs(dx) > 60) { go(current + (dx < 0 ? 1 : -1)); }
});

render(0);
</script>
</body>
</html>
