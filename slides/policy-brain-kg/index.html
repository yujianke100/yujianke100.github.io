<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Brain KG 构建工作流 — Ontology-Driven KG Construction</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:#e2e8f0}

  .stage{width:100%;height:100vh;position:relative;overflow:hidden}
  .slide{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:6vh 8vw;
    opacity:0;transform:scale(0.96) translateY(12px);
    pointer-events:none;
    transition:opacity 0.5s ease,transform 0.5s ease;
    overflow-y:auto;
  }
  .slide.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
  .slide:nth-child(even){background:linear-gradient(135deg,#111827 0%,#0f172a 100%)}
  .slide:nth-child(odd){background:linear-gradient(135deg,#0a0e1a 0%,#0d1117 100%)}

  /* Nav */
  .progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#06b6d4,#f59e0b);z-index:100;transition:width 0.3s ease}
  .sn{position:fixed;bottom:16px;right:24px;color:#475569;font-size:0.82rem;font-weight:600;z-index:100;font-variant-numeric:tabular-nums;user-select:none}
  .na{
    position:fixed;top:50%;transform:translateY(-50%);
    width:44px;height:44px;border-radius:50%;
    background:rgba(30,41,59,0.6);border:1px solid rgba(45,58,80,0.6);
    color:#64748b;font-size:1.4rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:100;
    transition:all 0.25s;backdrop-filter:blur(6px);
    opacity:0.7;
  }
  .na:hover{opacity:1;background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.4)}
  .na.pl{left:16px}.na.nx{right:16px}
  .na:disabled{opacity:0;pointer-events:none}

  /* Content wrapper - centered */
  .w{max-width:1000px;width:100%;text-align:center}
  .wl{max-width:1000px;width:100%;text-align:left}

  /* Typography */
  .w h1{font-size:clamp(2.2rem,4.5vw,3.6rem);font-weight:800;margin-bottom:1rem;line-height:1.2}
  .w h2{
    font-size:clamp(1.4rem,2.8vw,2rem);font-weight:700;margin-bottom:1.2rem;
    display:inline-block;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .wl h2{
    font-size:clamp(1.4rem,2.8vw,2rem);font-weight:700;margin-bottom:1.2rem;
    display:inline-block;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .w h3,.wl h3{font-size:clamp(1rem,1.4vw,1.15rem);font-weight:600;margin-bottom:0.5rem;color:#f59e0b}
  .w p,.wl p{line-height:1.7;font-size:clamp(0.95rem,1.3vw,1.1rem);color:#cbd5e1}
  .lead{font-size:clamp(1.05rem,1.5vw,1.2rem);color:#e2e8f0;line-height:1.8;margin-bottom:0.8rem}

  /* Hero title */
  .ht{
    font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;text-align:center;
    background:linear-gradient(135deg,#06b6d4 0%,#f59e0b 50%,#10b981 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:1rem;line-height:1.15;
  }
  .hs{text-align:center;font-size:clamp(0.95rem,1.5vw,1.2rem);max-width:720px;margin:0 auto;color:#94a3b8;line-height:1.8}
  .htg{display:inline-block;margin:1rem auto 0;padding:0.5rem 1.6rem;border:1px solid rgba(6,182,212,0.3);border-radius:10px;background:rgba(6,182,212,0.06);color:#06b6d4;font-size:clamp(0.82rem,1.1vw,0.95rem);text-align:center}

  /* Grids */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;text-align:left}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;text-align:left}
  .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0.8rem;text-align:left}
  @media(max-width:860px){.g2,.g3,.g4{grid-template-columns:1fr}}

  /* Cards */
  .card{
    background:linear-gradient(135deg,rgba(30,41,59,0.6),rgba(30,41,59,0.3));
    border:1px solid rgba(45,58,80,0.5);border-radius:12px;padding:1.2rem 1.1rem;
    transition:border-color 0.2s,transform 0.2s;
  }
  .card:hover{border-color:rgba(245,158,11,0.3);transform:translateY(-1px)}
  .card h4{color:#f59e0b;font-size:clamp(0.9rem,1.1vw,1rem);margin-bottom:0.4rem;font-weight:600}
  .card p{font-size:clamp(0.82rem,1vw,0.92rem);color:#94a3b8;line-height:1.55}
  .card .tag{display:inline-block;margin-bottom:0.4rem}

  /* Color blocks */
  .pb{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:0.9rem 1.1rem;text-align:left;transition:border-color 0.2s}
  .pb:hover{border-color:rgba(239,68,68,0.4)}
  .pb .l{color:#ef4444;font-weight:600;font-size:clamp(0.78rem,0.9vw,0.85rem);margin-bottom:0.2rem}
  .pb p{font-size:clamp(0.8rem,0.95vw,0.88rem);color:#94a3b8}
  .pg{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.25);border-radius:10px;padding:0.9rem 1.1rem;text-align:left;transition:border-color 0.2s}
  .pg:hover{border-color:rgba(16,185,129,0.4)}
  .pg .l{color:#10b981;font-weight:600;font-size:clamp(0.78rem,0.9vw,0.85rem);margin-bottom:0.2rem}
  .pg p{font-size:clamp(0.8rem,0.95vw,0.88rem);color:#94a3b8}
  .py{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:0.9rem 1.1rem;text-align:left;transition:border-color 0.2s}
  .py:hover{border-color:rgba(245,158,11,0.4)}
  .py .l{color:#f59e0b;font-weight:600;font-size:clamp(0.78rem,0.9vw,0.85rem);margin-bottom:0.2rem}
  .py p{font-size:clamp(0.8rem,0.95vw,0.88rem);color:#94a3b8}
  .pbl{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.25);border-radius:10px;padding:0.9rem 1.1rem;text-align:left}
  .pbl .l{color:#06b6d4;font-weight:600;font-size:clamp(0.78rem,0.9vw,0.85rem);margin-bottom:0.2rem}

  /* Tags */
  .tag{display:inline-block;padding:0.12rem 0.45rem;border-radius:5px;font-size:clamp(0.7rem,0.82vw,0.76rem);font-weight:600}
  .tg{background:rgba(245,158,11,0.12);color:#f59e0b}
  .tt{background:rgba(6,182,212,0.12);color:#06b6d4}
  .tgg{background:rgba(16,185,129,0.12);color:#10b981}
  .tr{background:rgba(239,68,68,0.12);color:#ef4444}
  .tp{background:rgba(167,139,250,0.12);color:#a78bfa}

  /* Quote block */
  .q{
    border-left:3px solid #f59e0b;padding:0.7rem 1.1rem;margin:0.6rem auto 0;max-width:900px;
    background:rgba(245,158,11,0.04);border-radius:0 8px 8px 0;
    font-size:clamp(0.82rem,1vw,0.9rem);color:#94a3b8;line-height:1.6;text-align:left
  }
  .q strong{color:#e2e8f0}

  /* Code box */
  .hl-box{
    background:#0d1117;border:1px solid rgba(45,58,80,0.4);border-radius:8px;
    padding:0.7rem 0.9rem;
    font-family:'SF Mono','Fira Code','Consolas',monospace;
    font-size:clamp(0.72rem,0.85vw,0.82rem);line-height:1.55;
    overflow-x:auto;margin:0.4rem 0;text-align:left
  }
  .hl-gray{color:#475569}.hl-key{color:#f59e0b}.hl-str{color:#10b981}.hl-op{color:#38bdf8}

  /* Architecture box */
  .arch-box{
    background:#0d1117;border-radius:10px;padding:1rem;margin:0.5rem auto;max-width:900px;
    border:1px solid rgba(45,58,80,0.3);
    font-family:'SF Mono','Fira Code','Consolas',monospace;
    font-size:clamp(0.74rem,0.88vw,0.84rem);line-height:1.55;overflow-x:auto;text-align:left
  }

  /* Timeline */
  .timeline{position:relative;padding-left:22px;margin:0.6rem auto;max-width:800px;text-align:left}
  .timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:rgba(45,58,80,0.5)}
  .tl-item{position:relative;margin-bottom:0.8rem;padding-left:0.3rem}
  .tl-item::before{content:'';position:absolute;left:-18px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid;background:rgba(30,41,59,0.5)}
  .tl-item.green::before{border-color:#10b981}.tl-item.blue::before{border-color:#38bdf8}
  .tl-item.purple::before{border-color:#a78bfa}.tl-item.amber::before{border-color:#f59e0b}
  .tl-title{font-weight:600;font-size:clamp(0.85rem,1vw,0.92rem)}
  .tl-desc{font-size:clamp(0.74rem,0.88vw,0.82rem);color:#64748b;margin-top:0.15rem}

  /* Table */
  .tw{overflow-x:auto;margin:0.6rem auto;max-width:900px}
  table{width:100%;border-collapse:collapse;font-size:clamp(0.7rem,0.88vw,0.82rem)}
  th,td{padding:0.45rem 0.55rem;text-align:center;border-bottom:1px solid rgba(45,58,80,0.4)}
  th{background:rgba(30,41,59,0.6);color:#f59e0b;font-weight:600}
  td{color:#94a3b8}td b{color:#e2e8f0}

  /* Utility */
  .tc{text-align:center!important}
  .mb1{margin-bottom:0.7rem}.mt1{margin-top:0.7rem}
  .bounce{animation:b2 2s infinite}@keyframes b2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  ul{margin:0.3rem 0 0.3rem 1.2rem}li{line-height:1.55;color:#94a3b8;font-size:clamp(0.8rem,0.95vw,0.88rem)}
  strong{color:#e2e8f0}
  .sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,#f59e0b,transparent);margin:0.6rem auto}

  /* Flow row */
  .flow-row{display:flex;align-items:center;justify-content:center;gap:0.5rem;flex-wrap:wrap;margin:0.5rem 0}
  .flow-box{
    padding:0.5rem 0.9rem;border-radius:7px;border:1.5px solid;
    font-size:clamp(0.72rem,0.85vw,0.82rem);font-weight:600;text-align:center;min-width:70px
  }
  .flow-arrow{color:#475569;font-size:1.1rem}
  .f-green{border-color:rgba(16,185,129,0.4);color:#10b981;background:rgba(16,185,129,0.06)}
  .f-blue{border-color:rgba(56,189,248,0.4);color:#38bdf8;background:rgba(56,189,248,0.06)}
  .f-purple{border-color:rgba(167,139,250,0.4);color:#a78bfa;background:rgba(167,139,250,0.06)}

  /* Cost table */
  .cost-grid{display:grid;grid-template-columns:auto 1fr;gap:0.3rem 1rem;margin:0.5rem auto;max-width:600px;text-align:left}
  .cost-label{color:#64748b;font-size:clamp(0.75rem,0.9vw,0.85rem)}
  .cost-val{color:#e2e8f0;font-weight:600;font-size:clamp(0.75rem,0.9vw,0.85rem)}
</style>
</head>
<body>
<div class="stage" id="app"></div>
<div class="progress" id="progress"></div>
<div class="sn" id="sn"></div>
<button class="na pl" id="prev">&lsaquo;</button>
<button class="na nx" id="next">&rsaquo;</button>

<script>
const slides = [];

// === Slide 1: Cover ===
slides.push(() => `<div class="w tc" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1">
  <div class="ht">Policy Brain KG</div>
  <p class="hs" style="font-size:clamp(1.1rem,2vw,1.6rem)">Ontology-Driven Knowledge Graph Construction</p>
  <p class="hs" style="margin-top:0.6rem">从 Human-in-the-loop 到自动构建的知识图谱工作流</p>
  <div class="htg">本体驱动 · 本地大模型 · 大规模政策数据 · GNN 下游</div>
  <p style="margin-top:3vh;color:#475569;font-size:0.8rem"><span class="bounce" style="display:inline-block">&darr;</span> 按 &rarr; 键浏览</p>
</div>`);

// === Slide 2: Why KG ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>为什么要在此刻讨论 KG 构建？</h2></div>
  <p class="lead tc">数据已经就位，但知识还是散装的</p>
  <div class="g2">
    <div class="pg"><div class="l">✅ 已有数据资产 · 一仓五库框架</div>
      <p><b>政策主题仓</b>：政策文本百万级 · AI政策（中央/省/地市）<br>
         <b>法人综合库</b>：企业注册与退出 800万+<br>
         <b>人口综合库</b>：LinkedIn · CHFS · 雇主-雇员匹配<br>
         <b>宏观经济库</b>：宏观统计面板·上市公司MD&A<br>
         <b>公共信用库</b>：裁判文书千万级 · 法律法规十万级</p>
    </div>
    <div class="pb"><div class="l">❌ 当前瓶颈</div>
      <p>数据是"散装"的——政策之间没有关系链接，裁判文书无法关联到引用政策，企业的政策红利传导无法被结构化查询</p>
    </div>
  </div>
  <div class="q"><strong>一个简单的问题暴露了差距</strong>：<br>"2024年国务院发布的减税降费政策，哪些在2025年被废止？被废止后有多少裁判文书还引用它们？"<br>没有 KG → 搜索 + 人工拼凑；有了 KG → 一条 Cypher 查询</div>
</div>`);

// === Slide 3: The Hard Part ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>全局构图最大的困难在哪？</h2></div>
  <p class="lead tc">不是技术不会，是量太大、质量不可控</p>
  <div class="g2">
    <div class="pb"><div class="l">🔴 数据规模</div>
      <p>1.3M 政策 × 2K tokens ≈ 2.6B tokens。全量用顶级模型 API 抽取成本高。<br><br>裁判文书 163.7M 全量抽取不现实——不是"抽取"，是"全文翻译"级别的开销。</p>
    </div>
    <div class="pb"><div class="l">🔴 抽取质量</div>
      <p>政策文本是中国特色法律语言："按照《xx法》第x条有关规定"、缩略语、引用的引用嵌套。LLM 精度 85-92%，8% 噪声在 1.3M 规模下 = <b style="color:#ef4444">10万+ 条错误三元组</b>。</p>
    </div>
  </div>
  <div class="q"><strong>但正因为难，所以有学术价值。</strong> 工程挑战 = 研究贡献。</div>
</div>`);

// === Slide 4: Why Ontology-Driven ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>为什么选本体驱动？</h2></div>
  <p class="lead tc">三个路线的对比一目了然</p>
  <div class="g2">
    <div class="card"><h4>🗺️ 纯 LLM Wiki (RAG)</h4>
      <span class="tag tg">搜索好，结构差</span>
      <p style="margin-top:0.4rem">向量检索在"找文档"上很好，但回答不了结构化问题：哪些政策之间是废止关系？<b>GNN 没有图可喂</b>。</p>
    </div>
    <div class="card"><h4>🏗️ 纯 KG (自底向上)</h4>
      <span class="tag tr">噪声不可控</span>
      <p style="margin-top:0.4rem">无 schema 约束，LLM 自由抽取的海量三元组充满噪声、冗余、不一致。<b>垃圾进垃圾出</b>。</p>
    </div>
    <div class="card" style="grid-column:1/-1"><h4>🎯 本体驱动 KG（我们选的）</h4>
      <span class="tag tgg">Schema 先定义，LLM 再填充</span>
      <p style="margin-top:0.4rem">先由 Human + LLM 协作定义领域本体（类、关系、约束），再让 LLM <b>按 schema 约束</b> 抽取实例。噪声可检测、质量可衡量、GNN 有干净输入。</p>
    </div>
  </div>
  <div class="q"><strong>核心区别</strong>：不是"LLM 随便抽→拼成图"；而是"先画好框→LLM 往里填→填完检查"。</div>
</div>`);

// === Slide 5: LLM Instance Population ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>LLM 实例填充到底是什么意思？</h2></div>
  <p class="lead tc">不是动态编程，是 <b>Schema-Guided Extraction</b></p>
  <div class="q"><strong>不是</strong>"写一个程序去爬/解析"——没有 if-else 控制流。<br><strong>而是</strong>：给定 schema → 给 LLM 看文本 + 抽取规范 → LLM 输出结构化 JSON。</div>
  <div class="hl-box">
<span class="hl-gray">// Schema 定义（人先画框）</span><br>
{ <span class="hl-key">"policy"</span>: { properties: [发文机关, 发文时间, 文号, 效力层级], relations: [废止, 修订, 依据, 适用于, 补充] } }<br><br>
<span class="hl-gray">// LLM 读政策文本 → 输出（LLM 往里填）</span><br>
{ <span class="hl-key">"entities"</span>: [{ <span class="hl-str">"type"</span>: <span class="hl-str">"政策"</span>, <span class="hl-str">"id"</span>: <span class="hl-str">"财税[2023]1号"</span>, <span class="hl-str">"发文机关"</span>: <span class="hl-str">"财政部"</span> }],<br>
&nbsp;&nbsp;<span class="hl-key">"relations"</span>: [{ source: <span class="hl-str">"财税[2023]1号"</span>, type: <span class="hl-str">"废止"</span>, target: <span class="hl-str">"财税[1999]5号"</span> }] }
  </div>
  <div class="g3">
    <div class="pg tc"><b style="color:#10b981">✅ Schema 约束</b><br><span style="color:#94a3b8;font-size:0.82rem">LLM 不会凭空创造新关系</span></div>
    <div class="pg tc"><b style="color:#10b981">✅ 结构化可查</b><br><span style="color:#94a3b8;font-size:0.82rem">直接出 JSON，无需多阶段管线</span></div>
    <div class="pg tc"><b style="color:#10b981">✅ 质量可检</b><br><span style="color:#94a3b8;font-size:0.82rem">合规检查自动校验异常值</span></div>
  </div>
  <div class="q" style="margin-top:0.4rem">LLM ≈ 智能 INSERT INTO：非结构化文本 → 图数据库的桥梁。</div>
</div>`);

// === Slide 6: Local Model ===
slides.push(() => `<div class="wl" style="display:flex;flex-direction:column;justify-content:center;flex:1">
  <div class="w tc"><h2>成本与安全：用本地模型</h2></div>
  <p class="lead tc">API 方式成本可控，但数据安全更重要——1.3M 政策全部走外网 API 不放心</p>
  <div class="g2">
    <div class="card"><h4>两个方案对比</h4>
      <table style="margin-top:0.4rem">
        <tr><th></th><th>API (DeepSeek flash)</th><th>本地 (Qwen3.6-27B)</th></tr>
        <tr><td style="text-align:left">成本</td><td>~$200 / 全量</td><td><b style="color:#10b981">零增量成本</b></td></tr>
        <tr><td style="text-align:left">数据安全</td><td>数据出校园网</td><td><b style="color:#10b981">全程内网</b></td></tr>
        <tr><td style="text-align:left">速度</td><td>API 并发限制</td><td><b style="color:#10b981">GPU 集群可控</b></td></tr>
        <tr><td style="text-align:left">质量</td><td>顶级模型</td><td>Qwen3 足够，<1% 精度差</td></tr>
      </table>
    </div>

// === Slide Manager ===
let current = 0;
const app = document.getElementById('app');
const progress = document.getElementById('progress');
const sn = document.getElementById('sn');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

function render(idx) {
  const html = `<div class="slide active">${slides[idx]()}</div>`;
  app.innerHTML = html;
  progress.style.width = ((idx + 1) / slides.length * 100) + '%';
  sn.textContent = (idx + 1) + ' / ' + slides.length;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === slides.length - 1;
}

function go(n) {
  if (n < 0 || n >= slides.length) return;
  current = n;
  render(current);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
});
prevBtn.addEventListener('click', () => go(current - 1));
nextBtn.addEventListener('click', () => go(current + 1));

let tsx = 0;
document.addEventListener('touchstart', e => { tsx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tsx;
  if (Math.abs(dx) > 60) { go(current + (dx < 0 ? 1 : -1)); }
});

render(0);
</script>
